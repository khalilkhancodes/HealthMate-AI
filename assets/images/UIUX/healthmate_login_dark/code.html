<!-- Background Decoration -->
<div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px]"></div>

<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container/20 rounded-xl mb-base border border-primary/30 neon-glow">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight mb-xs">HealthMate</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant uppercase tracking-widest">Obsidian Vitality Protocol</p>
</div>
<!-- Form Card -->
<div class="glass-card rounded-xl p-md md:p-lg">
<h2 class="font-title-md text-title-md text-on-surface mb-lg text-center">Identity Verification</h2>
<form class="space-y-md">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-outline-variant block">BIO-LINK EMAIL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline text-[20px] px-2">mail</span>
<input class="w-full input-dark pl-10 pr-4 py-3 text-on-surface placeholder:text-outline-variant/50 rounded-t-lg" placeholder="agent@healthmate.sys" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-outline-variant block">SECURE KEY</label>
<a class="text-[10px] font-label-md text-primary hover:text-primary-fixed uppercase tracking-tighter" href="#">Lost Access?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline text-[20px] px-2">lock</span>
<input class="w-full input-dark pl-10 pr-10 py-3 text-on-surface placeholder:text-outline-variant/50 rounded-t-lg" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-outline text-[20px] cursor-pointer hover:text-primary transition-colors">visibility</span>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-on-primary font-title-md text-title-md py-4 rounded-lg flex items-center justify-center gap-base transition-all active:scale-95 neon-glow hover:brightness-110" type="submit">
                    AUTHORIZE ACCESS
                    <span class="material-symbols-outlined">login</span>
</button>

<div class="flex items-center my-lg">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<span class="mx-md font-label-md text-label-md text-outline-variant whitespace-nowrap">OR SYNC VIA</span>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->

<button class="flex items-center justify-center gap-xs py-3 border border-outline-variant/30 rounded-lg hover:bg-surface-container transition-colors group">

<span class="font-label-md text-label-md">APPLE ID</span>
</button>
</div>

</p>

<div class="w-1 h-4 bg-primary rounded-full animate-pulse"></div>
<div class="w-1 h-6 bg-primary rounded-full animate-pulse" style="animation-delay: 0.2s"></div>
<div class="w-1 h-3 bg-primary rounded-full animate-pulse" style="animation-delay: 0.4s"></div>
