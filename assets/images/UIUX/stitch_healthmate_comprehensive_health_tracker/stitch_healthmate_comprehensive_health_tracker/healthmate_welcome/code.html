<body class="bg-background text-on-background">
<!-- Splash Screen Section -->
<section class="fixed inset-0 z-[100] bg-primary flex flex-col items-center justify-center" id="splash">
<div class="flex flex-col items-center space-y-4">
<div class="w-24 h-24 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-primary tracking-tight">HealthMate</h1>
<p class="font-body-md text-body-md text-primary-fixed-dim opacity-90">Your Clinical Partner in Health</p>
</div>
</section>
<!-- Onboarding Container (Horizontal Scroll Simulation) -->
<main class="relative h-screen overflow-hidden flex flex-col">
<!-- Onboarding Slide 1: Education -->
<div class="flex-shrink-0 w-full h-full flex flex-col items-center justify-between py-12 px-margin-mobile">
<div class="w-full max-w-md flex flex-col items-center space-y-8">
<div class="w-full h-80 rounded-xl overflow-hidden shadow-sm bg-surface-container-high relative">
<img class="w-full h-full object-cover" data-alt="A clean, bright medical interior with a soft green accent wall. A modern fitness tracker sits on a white table next to a glass of water and a vibrant green apple. The lighting is bright and airy, using high-key tones to create a sense of health and vitality. The overall aesthetic is professional, minimalist, and clinical yet welcoming." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEkasF0C4ym8argOkUkQKnT0qewsQnI0Ni51E3M-RZq8qpLFTZpVM_tJsWVoMfWaeoQGa3bYDDX2CcGHqWvWzBbGrV2zG8g5CFomYpPGT15twFAwZjuU8i7mShDxCYkfYfxxg_vKNjupB-Yx9R-OQwqXAyl1-0XwrkZRQxYzgcVbpms1JK0IRNUGAxX5pTSV8d5XbnV0PdbnqOEbwHZJ_zPNATCHmDQwk-rSE4Te2gQrux6bUO13V6jqxoZkJ-T87Mhp1Gdx_xSFo"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<div class="text-center space-y-4">
<h2 class="font-headline-md text-headline-md text-on-surface">Precision Tracking</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                        Monitor your vitals with clinical accuracy and intuitive data visualizations designed for clarity.
                    </p>
</div>
</div>
<!-- Onboarding Controls -->
<div class="w-full max-w-md flex flex-col items-center space-y-8">
<div class="flex space-x-2">
<div class="w-8 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-title-lg text-title-lg transition-all duration-200 active:scale-95 shadow-sm">
                    Continue
                </button>
</div>
</div>
</main>
<!-- Login/Signup Screen (Overlaid for demo purpose) -->
<!-- In a real app, this would be the next step in the flow -->
<section class="fixed inset-0 z-50 bg-background flex flex-col px-margin-mobile py-12 overflow-y-auto hide-scroll hidden" id="auth">
<div class="w-full max-w-md mx-auto flex flex-col h-full">
<header class="mb-12">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to continue your journey</p>
</header>
<!-- Social Logins -->
<div class="space-y-4 mb-10">
<button class="w-full py-3.5 border-[1.5px] border-outline-variant rounded-xl flex items-center justify-center space-x-3 bg-surface-container-lowest hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">google</span>
<span class="font-body-lg text-body-lg text-on-surface">Continue with Google</span>
</button>
<button class="w-full py-3.5 border-[1.5px] border-outline-variant rounded-xl flex items-center justify-center space-x-3 bg-surface-container-lowest hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">ios</span>
<span class="font-body-lg text-body-lg text-on-surface">Continue with Apple</span>
</button>
</div>
<div class="flex items-center space-x-4 mb-10">
<div class="flex-grow h-[1px] bg-outline-variant"></div>
<span class="font-label-md text-label-md text-outline">OR EMAIL</span>
<div class="flex-grow h-[1px] bg-outline-variant"></div>
</div>
<!-- Standard Form -->
<form class="space-y-6 flex-grow">
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Email Address</label>
<input class="w-full px-4 py-4 bg-surface-container-low border-b-[1.5px] border-outline focus:border-primary focus:ring-0 rounded-t-lg transition-all font-body-lg text-body-lg" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-1">Password</label>
<div class="relative">
<input class="w-full px-4 py-4 bg-surface-container-low border-b-[1.5px] border-outline focus:border-primary focus:ring-0 rounded-t-lg transition-all font-body-lg text-body-lg" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-on-surface-variant cursor-pointer">visibility_off</span>
</div>
<div class="flex justify-end">
<a class="font-label-lg text-label-lg text-primary mt-1" href="#">Forgot Password?</a>
</div>
</div>
<button class="w-full py-4 bg-primary text-on-primary rounded-xl font-title-lg text-title-lg mt-4 transition-all duration-200 active:scale-95 shadow-md" type="submit">
                    Sign In
                </button>
</form>
<footer class="mt-12 text-center pb-8">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <button class="text-primary font-title-lg ml-1 font-semibold">Sign Up</button>
</p>
</footer>
</div>
</section>
<!-- Simple layout switcher simulation -->
<script>
        // Automatic splash screen transition simulation
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            splash.style.transition = 'opacity 0.5s ease';
            setTimeout(() => splash.classList.add('hidden'), 500);
        }, 2000);

        // Interaction simulation for "Continue" button
        document.querySelector('button').addEventListener('click', () => {
            document.getElementById('auth').classList.remove('hidden');
        });
    </script>
